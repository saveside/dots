# =============================================================================
# DEVICE PROFILE: Desktop Dual Monitor Setup
# =============================================================================
# Device-specific configuration for desktop with dual monitors
# Profile name: yagiz-notebook
# 
# To use this profile, include it in hyprland.conf:
# source = devices/yagiz-notebook.conf
# =============================================================================

# =============================================================================
# MONITOR VARIABLES AND CONFIGURATION
# =============================================================================
$scr2 = eDP-2

# Monitor setup: Primary 1080p@165Hz
monitor = $scr2, 1920x1200@165, 0x0, 1

general {
    layout = scrolling
}

# =============================================================================
# INPUT DEVICE CONFIGURATION
# =============================================================================
input {
  kb_layout = tr
  numlock_by_default = true
  kb_options = "grp:win_space_toggle"
  
  #~~~ touchpad configuration (disabled for desktop)
  touchpad {
    disable_while_typing = true
    tap-to-click = true
    natural_scroll = false
    middle_button_emulation = true
  }
}

# =============================================================================
# DEVICE-SPECIFIC PATHS AND RESOURCES
# =============================================================================
$wallpaper = rgb(/home/yagiz/.config/wallpapers/office_edited.jpg)

# =============================================================================
# DEVICE-SPECIFIC KEYBINDS AND APPLICATIONS
# =============================================================================

bind = $mod, d, exec, equibop --ozone-platform-hint=wayland --enable-features=WaylandWindowDecorations --enable-features=AcceleratedVideoDecodeLinuxGL --enable-features=AcceleratedVideoEncoder --enable-features=VaapiIgnoreDriverChecks --enable-features=CanvasOopRasterization --enable-gpu-rasterization --enable-zero-copy --enable-features=WebRTCPipeWireCapturer
bind = , Print, exec, ~/.config/hypr/bin/satty-screenshot.sh

# =============================================================================
# DEVICE-SPECIFIC STARTUP (if any)
# =============================================================================
# Add any desktop-specific startup applications here

exec-once = [workspace 1 silent] equibop --ozone-platform-hint=wayland --enable-features=WaylandWindowDecorations --enable-features=AcceleratedVideoDecodeLinuxGL --enable-features=AcceleratedVideoEncoder --enable-features=VaapiIgnoreDriverChecks --enable-features=CanvasOopRasterization --enable-gpu-rasterization --enable-zero-copy --enable-features=WebRTCPipeWireCapture
exec-once = [workspace special:hidden silent] ghostty
