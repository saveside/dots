[main]
term=xterm-256color
font=JetBrainsMono Nerd Font:style=Bold:size=10
font-bold=Monaspace Neon:style=ExtraBold:size=10
font-italic=Monaspace Neon:style=Italic:size=10
font-bold-italic=Monaspace Neon:style=Bold Italic:size=10
pad=12x12
dpi-aware=yes

[cursor]
style=beam

[mouse]
hide-when-typing=yes

[colors-dark]
# Transparency disabled for TUI solid look
alpha=1.0
background=0d0d0d
foreground=fce4ec

## Selection Colors

## Sakura Soft Palette (Improved Contrast)
regular0=1a1a1a   # black
regular1=f48fb1   # red (blossom pink)
regular2=ffab91   # green (peachy pink)
regular3=ffe082   # yellow (soft pollen)
regular4=ce93d8   # blue (soft petal purple)
regular5=f06292   # magenta (vibrant sakura)
regular6=80deea   # cyan (soft sky)
regular7=e0e0e0   # white

## Bright variants
bright0=423d42    # bright black
bright1=ffb2cc    # bright red
bright2=ffccbc    # bright green
bright3=fff59d    # bright yellow
bright4=e1bee7    # bright blue
bright5=f8bbd0    # bright magenta
bright6=b2ebf2    # bright cyan
bright7=ffffff    # bright white

[key-bindings]
font-increase=Control+Shift+plus
font-decrease=Control+minus
font-reset=Control+0
